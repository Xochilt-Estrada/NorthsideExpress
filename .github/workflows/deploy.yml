name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          npm install

      - name: Build web app
        run: |
          npx expo export --platform web

      - name: Fix for GitHub Pages (SPA support)
        run: |
          # Create a .nojekyll file to bypass Jekyll processing
          touch dist/.nojekyll
          
          # Copy index.html to 404.html for SPA routing support
          cp dist/index.html dist/404.html
          
          # Also create a copy at the root level
          cp dist/index.html dist/index.html.bak
          
          echo "✅ Fixed for GitHub Pages SPA deployment!"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
